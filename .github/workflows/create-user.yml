name: Create User

# Create a Cognito user in the Prod user pool. Use this to onboard
# internal users during Phase 1 (Cognito self sign-up is disabled).
#
# Requirements:
# - Bootstrap has been run (OIDC role exists with cognito-idp permissions).
# - App-prod stack has been deployed (User Pool exists).

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Email address (also the login username)'
        required: true
        type: string
      password:
        description: 'Initial password (must meet Cognito policy: min 12, mixed case, digit, symbol)'
        required: true
        type: string
      name:
        description: 'Display name (optional)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Read UserPool ID from CFN outputs
        id: outputs
        run: |
          STACK="App-prod"
          POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" \
            --output text)
          if [ -z "$POOL_ID" ] || [ "$POOL_ID" = "None" ]; then
            echo "::error::Could not read UserPoolId from $STACK — has Prod been deployed yet?"
            exit 1
          fi
          echo "user_pool_id=$POOL_ID" >> "$GITHUB_OUTPUT"
          echo "Using User Pool: $POOL_ID"

      - name: Create user if missing (suppress invite email)
        env:
          POOL_ID: ${{ steps.outputs.outputs.user_pool_id }}
          EMAIL: ${{ inputs.email }}
          NAME: ${{ inputs.name }}
        run: |
          # Build attributes
          ATTRS="Name=email,Value=$EMAIL Name=email_verified,Value=true"
          if [ -n "$NAME" ]; then
            ATTRS="$ATTRS Name=name,Value=$NAME"
          fi
          # Idempotent: if the user already exists, admin-create-user fails
          # with UsernameExistsException. Swallow that specific failure so
          # re-running this workflow works as a password reset.
          if aws cognito-idp admin-create-user \
               --user-pool-id "$POOL_ID" \
               --username "$EMAIL" \
               --user-attributes $ATTRS \
               --message-action SUPPRESS 2>/tmp/cu.err; then
            echo "Created new user $EMAIL"
          else
            if grep -q UsernameExistsException /tmp/cu.err; then
              echo "User $EMAIL already exists — continuing to password reset"
            else
              cat /tmp/cu.err
              exit 1
            fi
          fi

      - name: Set permanent password
        env:
          POOL_ID: ${{ steps.outputs.outputs.user_pool_id }}
          EMAIL: ${{ inputs.email }}
          PASSWORD: ${{ inputs.password }}
        run: |
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$POOL_ID" \
            --username "$EMAIL" \
            --password "$PASSWORD" \
            --permanent

      - name: Summary
        env:
          EMAIL: ${{ inputs.email }}
        run: |
          {
            echo "# User ready"
            echo ""
            echo "- **Email / Username**: \`$EMAIL\`"
            echo "- **Status**: CONFIRMED (permanent password set)"
            echo ""
            echo "Re-running this workflow with the same email acts as a"
            echo "password reset; supply a new password and it'll replace"
            echo "the old one."
          } >> "$GITHUB_STEP_SUMMARY"
