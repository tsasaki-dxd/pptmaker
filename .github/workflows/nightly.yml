name: Nightly

on:
  schedule:
    - cron: '0 18 * * *'  # 03:00 JST
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r app/api/requirements.txt pyyaml
      - name: Run LLM Evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "Skipping evals (ANTHROPIC_API_KEY not set)"
            exit 0
          fi
          python -m evals.runner
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: evals/report.json
