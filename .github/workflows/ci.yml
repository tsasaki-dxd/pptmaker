name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  # ---------- Validation (PR only) ----------
  lint-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install tooling
        run: |
          pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          pip install -r app/api/requirements.txt
          pip install -r app/render/requirements.txt

      - name: Ruff
        run: ruff check app tests evals

      - name: Mypy
        run: mypy app || true  # Phase 1 tolerant

      - name: Pytest
        run: pytest tests/unit -v

  web-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  cdk-synth:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -r requirements.txt
      - run: npx -y aws-cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: ap-northeast-1

  # ---------- Deploy (main push only) ----------
  # GHA is the *producer*: build image, synth + publish assets, package the
  # cloud assembly + web source, upload, and kick the pipeline. The pipeline
  # then does the CFN deploy AND the Next.js build + web sync in one
  # CodeBuild action. No waiting in GHA.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve account
        id: acct
        run: |
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          echo "acct=$ACCT" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Render image
        env:
          REG: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
        run: |
          docker build -t "$REG/$REPO:${{ github.sha }}" app/render
          docker push "$REG/$REPO:${{ github.sha }}"
          docker tag "$REG/$REPO:${{ github.sha }}" "$REG/$REPO:prod"
          docker push "$REG/$REPO:prod"

      - name: Install CDK + infra deps
        run: |
          npm install -g aws-cdk cdk-assets
          pip install -r infra/requirements.txt

      - name: cdk synth
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.acct.outputs.acct }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: cdk synth --quiet

      - name: Publish CDK assets (Lambda zip, Docker images)
        working-directory: infra/cdk.out
        run: |
          for manifest in *.assets.json; do
            echo "Publishing $manifest..."
            npx cdk-assets publish --path "$manifest"
          done

      - name: Package deploy artifact (cdk.out + app/web)
        run: |
          # The Deploy CodeBuild runs `cdk deploy App-prod` using cdk.out/,
          # then builds the Next.js static export from app/web/ and syncs to
          # the web bucket. Both must be in the artifact.
          mkdir -p /tmp/deploy
          cp -r infra/cdk.out /tmp/deploy/cdk.out
          mkdir -p /tmp/deploy/app
          cp -r app/web /tmp/deploy/app/web
          cd /tmp/deploy
          zip -rq /tmp/deploy.zip .
          ls -la /tmp/deploy.zip
          unzip -l /tmp/deploy.zip | head -20

      - name: Resolve deploy artifacts from Pipeline Stack outputs
        id: pipeline_outputs
        run: |
          OUT=$(aws cloudformation describe-stacks \
            --stack-name SlideForgePipelineStack \
            --query "Stacks[0].Outputs" --output json)
          get() { echo "$OUT" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'; }
          {
            echo "pipeline_name=$(get PipelineName)"
            echo "deploy_bucket=$(get DeployBucketName)"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Upload artifact to deploy bucket
        env:
          DEPLOY_BUCKET: ${{ steps.pipeline_outputs.outputs.deploy_bucket }}
        run: |
          aws s3 cp /tmp/deploy.zip "s3://$DEPLOY_BUCKET/latest/deploy.zip"
          # Keep a SHA-tagged copy for rollback / audit
          aws s3 cp /tmp/deploy.zip "s3://$DEPLOY_BUCKET/by-sha/${{ github.sha }}/deploy.zip"

      - name: Trigger CodePipeline
        env:
          PIPELINE_NAME: ${{ steps.pipeline_outputs.outputs.pipeline_name }}
        run: |
          EXEC=$(aws codepipeline start-pipeline-execution \
            --name "$PIPELINE_NAME" \
            --query 'pipelineExecutionId' --output text)
          echo "Pipeline $PIPELINE_NAME execution started: $EXEC"
          {
            echo "# Deploy triggered"
            echo ""
            echo "Pipeline: \`$PIPELINE_NAME\`"
            echo "Execution: \`$EXEC\`"
            echo ""
            echo "Follow the progress in the CodePipeline console. On success,"
            echo "the website will be available at the URL in the App-prod"
            echo "stack's \`WebsiteUrl\` output."
          } >> "$GITHUB_STEP_SUMMARY"

