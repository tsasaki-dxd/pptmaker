name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  # ---------- Validation (PR only) ----------
  lint-test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install tooling
        run: |
          pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          pip install -r app/api/requirements.txt
          pip install -r app/render/requirements.txt

      - name: Ruff
        run: ruff check app tests evals

      - name: Mypy
        run: mypy app || true  # Phase 1 tolerant

      - name: Pytest
        run: pytest tests/unit -v

  web-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  cdk-synth:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -r requirements.txt
      - run: npx -y aws-cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: ap-northeast-1

  # ---------- Deploy (main push only) ----------
  # GHA is the *producer*: build image, synth + publish assets, upload
  # artifact, then kick the pipeline. The pipeline does the cdk deploy.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve account
        id: acct
        run: |
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          echo "acct=$ACCT" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Render image
        env:
          REG: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
        run: |
          docker build -t "$REG/$REPO:${{ github.sha }}" app/render
          docker push "$REG/$REPO:${{ github.sha }}"
          docker tag "$REG/$REPO:${{ github.sha }}" "$REG/$REPO:prod"
          docker push "$REG/$REPO:prod"

      - name: Install CDK + infra deps
        run: |
          npm install -g aws-cdk cdk-assets
          pip install -r infra/requirements.txt

      - name: cdk synth
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.acct.outputs.acct }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: cdk synth --quiet

      - name: Publish CDK assets (Lambda zip, Docker images)
        working-directory: infra/cdk.out
        run: |
          for manifest in *.assets.json; do
            echo "Publishing $manifest..."
            npx cdk-assets publish --path "$manifest"
          done

      - name: Package cloud assembly
        run: |
          cd infra
          zip -r /tmp/cdk.out.zip cdk.out
          ls -la /tmp/cdk.out.zip

      - name: Upload artifact to deploy bucket
        env:
          DEPLOY_BUCKET: slideforge-deploy-${{ steps.acct.outputs.acct }}
        run: |
          aws s3 cp /tmp/cdk.out.zip "s3://$DEPLOY_BUCKET/latest/cdk.out.zip"
          # Keep a SHA-tagged copy for rollback / audit
          aws s3 cp /tmp/cdk.out.zip "s3://$DEPLOY_BUCKET/by-sha/${{ github.sha }}/cdk.out.zip"

      - name: Trigger CodePipeline
        id: trigger
        run: |
          EXEC=$(aws codepipeline start-pipeline-execution \
            --name SlideForgePipeline \
            --query 'pipelineExecutionId' --output text)
          echo "Pipeline execution: $EXEC"
          echo "exec_id=$EXEC" >> "$GITHUB_OUTPUT"

      - name: Wait for pipeline to finish
        env:
          EXEC_ID: ${{ steps.trigger.outputs.exec_id }}
        run: |
          echo "Polling pipeline execution $EXEC_ID (timeout 30 min)..."
          for i in $(seq 1 60); do
            STATUS=$(aws codepipeline get-pipeline-execution \
              --pipeline-name SlideForgePipeline \
              --pipeline-execution-id "$EXEC_ID" \
              --query 'pipelineExecution.status' --output text)
            echo "[$i/60] $STATUS"
            case "$STATUS" in
              Succeeded) echo "Pipeline deploy complete"; break ;;
              Failed|Cancelled|Stopped|Superseded) echo "::error::Pipeline $STATUS"; exit 1 ;;
            esac
            sleep 30
          done

      - name: Read App-prod CFN outputs
        id: outputs
        run: |
          OUT=$(aws cloudformation describe-stacks --stack-name App-prod --query "Stacks[0].Outputs" --output json)
          get() { echo "$OUT" | jq -r --arg k "$1" '.[] | select(.OutputKey==$k) | .OutputValue'; }
          {
            echo "api_endpoint=$(get ApiEndpoint)"
            echo "user_pool_id=$(get UserPoolId)"
            echo "user_pool_client_id=$(get UserPoolClientId)"
            echo "web_bucket=$(get WebBucketName)"
            echo "website_url=$(get WebsiteUrl)"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Build and sync web
        working-directory: app/web
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi
          npm run build
          cat > out/config.json <<EOF
          {
            "apiEndpoint": "${{ steps.outputs.outputs.api_endpoint }}",
            "userPoolId": "${{ steps.outputs.outputs.user_pool_id }}",
            "userPoolClientId": "${{ steps.outputs.outputs.user_pool_client_id }}",
            "region": "${{ env.AWS_REGION }}"
          }
          EOF
          aws s3 sync out/ "s3://${{ steps.outputs.outputs.web_bucket }}/" \
            --delete \
            --cache-control "public, max-age=300"
          aws s3 cp out/config.json "s3://${{ steps.outputs.outputs.web_bucket }}/config.json" \
            --cache-control "no-store"

      - name: Summary
        run: |
          {
            echo "# Deployment complete"
            echo ""
            echo "| Component | Value |"
            echo "|-----------|-------|"
            echo "| Website URL | ${{ steps.outputs.outputs.website_url }} |"
            echo "| API Endpoint | ${{ steps.outputs.outputs.api_endpoint }} |"
            echo "| User Pool ID | \`${{ steps.outputs.outputs.user_pool_id }}\` |"
            echo ""
            echo "### Next step"
            echo "Run **Create User** workflow (Actions tab) to create login accounts."
          } >> "$GITHUB_STEP_SUMMARY"
