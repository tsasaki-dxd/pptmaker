name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install tooling
        run: |
          pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          pip install -r app/api/requirements.txt
          pip install -r app/render/requirements.txt

      - name: Ruff
        run: ruff check app tests evals

      - name: Mypy
        run: mypy app || true  # Phase 1 tolerant

      - name: Pytest
        run: pytest tests/unit -v

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  cdk-synth:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -r requirements.txt
      - run: npx -y aws-cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: '000000000000'
          CDK_DEFAULT_REGION: ap-northeast-1

  render-image:
    runs-on: ubuntu-latest
    needs: [lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Render image
        env:
          REG: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_REPOSITORY }}
        run: |
          docker build -t "$REG/$REPO:${{ github.sha }}" app/render
          docker push "$REG/$REPO:${{ github.sha }}"
          docker tag "$REG/$REPO:${{ github.sha }}" "$REG/$REPO:prod"
          docker push "$REG/$REPO:prod"
